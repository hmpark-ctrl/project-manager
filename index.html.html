/* ── 비밀번호 ── */
function PasswordGate({onAuth}){
  const [pw,setPw]=useState(""), [err,setErr]=useState(false);
  const go=()=>{if(pw===APP_PASSWORD){sessionStorage.setItem("auth","1");onAuth();}else{setErr(true);setPw("");}};
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1e1e2e,#2d2d3f)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:16,padding:40,width:360,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:36,marginBottom:8}}>🔒</div>
          <div style={{fontWeight:800,fontSize:18,color:"#1e293b"}}>팀 전용 접근</div>
          <div style={{color:"#94a3b8",fontSize:13,marginTop:4}}>비밀번호를 입력하세요</div>
        </div>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&go()}
          placeholder="비밀번호" autoFocus
          style={{width:"100%",padding:"11px 14px",borderRadius:8,border:err?"2px solid #ef4444":"1px solid #e2e8f0",fontSize:14,outline:"none",marginBottom:8}}/>
        {err&&<div style={{color:"#ef4444",fontSize:12,marginBottom:8}}>비밀번호가 올바르지 않습니다.</div>}
        <button onClick={go} style={{width:"100%",padding:11,background:"linear-gradient(135deg,#6366f1,#a855f7)",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>입장하기</button>
      </div>
    </div>
  );
}

/* ── 멤버 드롭다운 ── */
function MemberSelect({value, onChange, members, onAddMember}){
  const [adding, setAdding]=useState(false);
  const [newName, setNewName]=useState("");
  const addRef=useRef(null);
  useEffect(()=>{ if(adding) addRef.current?.focus(); },[adding]);
  const doAdd=()=>{
    const n=newName.trim();
    if(!n)return;
    onAddMember(n);
    onChange(n);
    setNewName(""); setAdding(false);
  };
  return(
    <div style={{display:"flex",gap:5,alignItems:"center"}}>
      {adding?(
        <>
          <input ref={addRef} value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&doAdd()}
            placeholder="이름 입력" className="inp" style={{flex:1}}/>
          <button onClick={doAdd} style={{padding:"4px 9px",background:"#6366f1",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700}}>추가</button>
          <button onClick={()=>setAdding(false)} style={{padding:"4px 7px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:6,cursor:"pointer",fontSize:11}}>취소</button>
        </>
      ):(
        <>
          <select value={value||""} onChange={e=>onChange(e.target.value)} className="inp" style={{flex:1}}>
            <option value="">선택 안함</option>
            {members.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          <button onClick={()=>setAdding(true)} title="새 이름 추가"
            style={{padding:"4px 9px",background:"#f1f5f9",color:"#6366f1",border:"1px solid #e2e8f0",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>+ 추가</button>
        </>
      )}
    </div>
  );
}

/* ── 상세 패널 ── */
function DetailPanel({task, projColor, onClose, onChange, members, onAddMember}){
  // 로컬 상태로 관리 → 입력 중 re-render 방지
  const [local, setLocal]=useState(task);
  const [newSub, setNewSub]=useState("");

  // 다른 태스크 선택 시에만 로컬 초기화
  useEffect(()=>{ setLocal(task); },[task.id]);

  const upd=(k,v)=>setLocal(l=>({...l,[k]:v}));
  const sync=(k,v)=>{ const u={...local,[k]:v}; setLocal(u); onChange(u); };
  const flush=()=>onChange(local); // blur 시 동기화

  const toggleSub=(sid)=>{
    const u={...local,subtasks:local.subtasks.map(s=>s.id===sid?{...s,done:!s.done}:s)};
    setLocal(u); onChange(u);
  };
  const addSub=()=>{
    if(!newSub.trim())return;
    const u={...local,subtasks:[...local.subtasks,{id:nid(),title:newSub.trim(),done:false}]};
    setLocal(u); onChange(u); setNewSub("");
  };
  const delSub=(sid)=>{
    const u={...local,subtasks:local.subtasks.filter(s=>s.id!==sid)};
    setLocal(u); onChange(u);
  };
  const doneCount=local.subtasks.filter(s=>s.done).length;

  const Row=({label,children})=>(
    <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 0",borderBottom:"1px solid #f8fafc"}}>
      <div style={{width:72,color:"#94a3b8",fontSize:11,paddingTop:5,flexShrink:0}}>{label}</div>
      <div style={{flex:1}}>{children}</div>
    </div>
  );

  return(
    <div style={{width:320,background:"#fff",borderLeft:"1px solid #e2e8f0",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
      <div style={{padding:"13px 14px",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:8}}>
        <div style={{flex:1,fontWeight:700,color:"#1e293b",fontSize:13,lineHeight:1.4}}>{local.title}</div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:17}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 14px 16px"}}>
        <div style={{padding:"10px 0",borderBottom:"1px solid #f8fafc"}}>
          <button onClick={()=>sync("status",local.status==="done"?"todo":"done")}
            style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${local.status==="done"?"#10b981":"#e2e8f0"}`,
              background:local.status==="done"?"#d1fae5":"#f8fafc",color:local.status==="done"?"#10b981":"#64748b",fontSize:11,fontWeight:700,cursor:"pointer"}}>
            {local.status==="done"?"✅ 완료됨":"○ 완료로 표시"}
          </button>
        </div>

        <Row label="담당자">
          <MemberSelect value={local.assignee} onChange={v=>sync("assignee",v)} members={members} onAddMember={onAddMember}/>
        </Row>
        <Row label="우선순위">
          <select value={local.priority} onChange={e=>sync("priority",e.target.value)} className="inp"
            style={{color:PC[local.priority],fontWeight:700,background:PC[local.priority]+"15",border:`1px solid ${PC[local.priority]}40`}}>
            {Object.entries(PRIORITY).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
        </Row>
        <Row label="제출한 사람">
          <MemberSelect value={local.submitter} onChange={v=>sync("submitter",v)} members={members} onAddMember={onAddMember}/>
        </Row>
        <Row label="기한">
          <input type="date" value={local.due} className="inp"
            onChange={e=>upd("due",e.target.value)} onBlur={flush}/>
        </Row>
        <Row label="상태">
          <select value={local.status} onChange={e=>sync("status",e.target.value)} className="inp"
            style={{color:SC[local.status],fontWeight:700,background:SC[local.status]+"15",border:`1px solid ${SC[local.status]}40`}}>
            {Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
        </Row>
        <Row label="세부 정보">
          <input value={local.detailLink} className="inp" placeholder="https://"
            onChange={e=>upd("detailLink",e.target.value)} onBlur={flush}/>
          {local.detailLink&&<a href={local.detailLink} target="_blank" style={{fontSize:10,color:projColor,display:"block",marginTop:3}}>🔗 링크 열기</a>}
        </Row>
        <Row label="참고 링크">
          <input value={local.refLink} className="inp" placeholder="https://"
            onChange={e=>upd("refLink",e.target.value)} onBlur={flush}/>
          {local.refLink&&<a href={local.refLink} target="_blank" style={{fontSize:10,color:projColor,display:"block",marginTop:3}}>🔗 링크 열기</a>}
        </Row>
        <Row label="메모">
          <textarea value={local.notes} className="inp" placeholder="메모..." rows={3}
            style={{resize:"vertical",lineHeight:1.5}}
            onChange={e=>upd("notes",e.target.value)} onBlur={flush}/>
        </Row>

        {/* 하위 작업 */}
        <div style={{paddingTop:12}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
            <span style={{fontWeight:700,color:"#1e293b",fontSize:12}}>하위 작업</span>
            {local.subtasks.length>0&&<span style={{fontSize:10,color:"#94a3b8",background:"#f1f5f9",padding:"1px 6px",borderRadius:20}}>{doneCount}/{local.subtasks.length}</span>}
          </div>
          {local.subtasks.length>0&&(
            <div style={{background:"#f8fafc",borderRadius:8,padding:"3px 0",marginBottom:7}}>
              {local.subtasks.map(s=>(
                <div key={s.id} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 10px"}}>
                  <div onClick={()=>toggleSub(s.id)}
                    style={{width:17,height:17,borderRadius:"50%",border:s.done?"none":`2px solid #cbd5e1`,background:s.done?projColor:"transparent",
                      display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                    {s.done&&<span style={{color:"#fff",fontSize:9,fontWeight:900}}>✓</span>}
                  </div>
                  <span style={{flex:1,fontSize:12,color:s.done?"#94a3b8":"#1e293b",textDecoration:s.done?"line-through":"none"}}>{s.title}</span>
                  <button onClick={()=>delSub(s.id)} style={{background:"none",border:"none",color:"#cbd5e1",cursor:"pointer",fontSize:12}}>✕</button>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:5}}>
            <input value={newSub} onChange={e=>setNewSub(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSub()}
              placeholder="+ 하위 작업 추가" className="inp" style={{flex:1}}/>
            <button onClick={addSub} style={{padding:"5px 10px",background:projColor,color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700}}>+</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── 대시보드 ── */
function Dashboard({projects, onSelectProject, onUpdateProject}){
  const [editId, setEditId]=useState(null);
  const [editData, setEditData]=useState({});
  const totalTasks=projects.reduce((a,p)=>a+p.tasks.length,0);
  const doneTasks=projects.reduce((a,p)=>a+p.tasks.filter(t=>t.status==="done").length,0);
  const doingTasks=projects.reduce((a,p)=>a+p.tasks.filter(t=>t.status==="doing").length,0);
  const todoTasks=projects.reduce((a,p)=>a+p.tasks.filter(t=>t.status==="todo").length,0);
  const totalBudget=projects.reduce((a,p)=>a+(parseInt((p.budget||"").replace(/,/g,""))||0),0);
  const startEdit=(p)=>{setEditId(p.id);setEditData({name:p.name,tag:p.tag,period:p.period||"",budget:p.budget||"",remark:p.remark||""});};
  const saveEdit=()=>{onUpdateProject(editId,editData);setEditId(null);};
  return(
    <div style={{flex:1,overflowY:"auto",background:"#f1f5f9"}}>
      <div style={{background:"linear-gradient(135deg,#1e1e2e,#2d2d3f)",padding:"28px 28px 24px"}}>
        <div style={{color:"#a78bfa",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:6}}>OVERVIEW</div>
        <div style={{color:"#fff",fontSize:22,fontWeight:800,marginBottom:20}}>전체 프로젝트 현황</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          {[["📁 프로젝트",projects.length,"#a78bfa"],["📋 전체 태스크",totalTasks,"#94a3b8"],["🔵 진행 중",doingTasks,"#60a5fa"],["✅ 완료",doneTasks,"#34d399"],["⭕ 할 일",todoTasks,"#9ca3af"]].map(([l,v,c])=>(
            <div key={l} style={{background:"rgba(255,255,255,.07)",borderRadius:12,padding:"12px 20px",minWidth:100}}>
              <div style={{color:c,fontSize:22,fontWeight:800}}>{v}</div>
              <div style={{color:"#94a3b8",fontSize:11,marginTop:2}}>{l}</div>
            </div>
          ))}
          {totalBudget>0&&(
            <div style={{background:"rgba(255,255,255,.07)",borderRadius:12,padding:"12px 20px",minWidth:100}}>
              <div style={{color:"#fbbf24",fontSize:22,fontWeight:800}}>{(totalBudget/10000).toLocaleString()}만</div>
              <div style={{color:"#94a3b8",fontSize:11,marginTop:2}}>💰 총 사업비</div>
            </div>
          )}
        </div>
      </div>
      <div style={{padding:24}}>
        <div style={{fontWeight:700,color:"#1e293b",fontSize:15,marginBottom:16}}>프로젝트 목록</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:16}}>
          {projects.map(p=>{
            const done=p.tasks.filter(t=>t.status==="done").length;
            const doing=p.tasks.filter(t=>t.status==="doing").length;
            const todo=p.tasks.filter(t=>t.status==="todo").length;
            const pct=p.tasks.length?Math.round(done/p.tasks.length*100):0;
            const isEditing=editId===p.id;
            return(
              <div key={p.id} style={{background:"#fff",borderRadius:14,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,.07)"}}>

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <span style={{background:"rgba(255,255,255,.2)",color:"#fff",fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:700}}>{p.tag}</span>
                      <div style={{color:"#fff",fontWeight:700,fontSize:13,marginTop:5,lineHeight:1.4}}>{p.name}</div>
                    </div>
                    <button onClick={e=>{e.stopPropagation();isEditing?saveEdit():startEdit(p);}}
                      style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer",fontWeight:600,flexShrink:0,marginLeft:8}}>
                      {isEditing?"저장":"✏️ 편집"}
                    </button>
                  </div>
                  <div style={{marginTop:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{color:"rgba(255,255,255,.8)",fontSize:11}}>진행률</span>
                      <span style={{color:"#fff",fontSize:12,fontWeight:700}}>{pct}%</span>
                    </div>
                    <div style={{height:5,background:"rgba(255,255,255,.25)",borderRadius:3}}>
                      <div style={{width:`${pct}%`,height:"100%",background:"#fff",borderRadius:3}}/>
                    </div>
                  </div>
                </div>
                <div style={{padding:"14px 16px"}}>
                  {isEditing?(
                    <div style={{display:"flex",flexDirection:"column",gap:7}}>
                      {[["사업명","name"],["사업기간","period"],["사업비","budget"],["비고","remark"]].map(([label,key])=>(
                        <div key={key} style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{width:50,fontSize:11,color:"#94a3b8",flexShrink:0}}>{label}</span>
                          <input value={editData[key]||""} onChange={e=>setEditData(d=>({...d,[key]:e.target.value}))} className="inp" style={{flex:1}}/>
                        </div>
                      ))}
                    </div>
                  ):(
                    <>
                      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
                        {[["사업기간",p.period],["사업비",p.budget?p.budget+"원":""],["비고",p.remark]].map(([label,val])=>val?(
                          <div key={label} style={{display:"flex",gap:8}}>
                            <span style={{width:50,fontSize:11,color:"#94a3b8",flexShrink:0}}>{label}</span>
                            <span style={{fontSize:12,color:"#475569"}}>{val}</span>
                          </div>
                        ):null)}
                      </div>
                      <div style={{display:"flex",gap:6,marginBottom:12}}>
                        {[[todo,"할 일","#6b7280"],[doing,"진행 중","#3b82f6"],[done,"완료","#10b981"]].map(([v,l,c])=>(
                          <div key={l} style={{flex:1,textAlign:"center",background:c+"10",borderRadius:8,padding:"6px 4px"}}>
                            <div style={{fontWeight:800,fontSize:16,color:c}}>{v}</div>
                            <div style={{fontSize:9,color:c,fontWeight:600}}>{l}</div>
                          </div>
                        ))}
                      </div>
                      <button onClick={()=>onSelectProject(p.id)}
                        style={{width:"100%",padding:"8px 0",background:p.color+"15",color:p.color,border:`1px solid ${p.color}30`,borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                        태스크 보기 →
                      </button>
                    </>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ── 메인 ── */
function MainApp(){
  const [projects, setProjects]=useState(initProjects);
  const [members, setMembers]=useState(INIT_MEMBERS);
  const [view, setView]=useState("dashboard");
  const [filter, setFilter]=useState("all");
  const [sort, setSort]=useState("default"); // default | due | priority
  const [selTask, setSelTask]=useState(null);
  const [showAdd, setShowAdd]=useState(false);
  const [newTask, setNewTask]=useState({title:"",status:"todo",priority:"mid",due:"",assignee:""});
  const [showAddProj, setShowAddProj]=useState(false);
  const [newProj, setNewProj]=useState({name:"",tag:"",color:"#6366f1",period:"",budget:"",remark:""});

  const proj = view!=="dashboard" ? projects.find(p=>p.id===view) : null;

  const addMember=(name)=>{ if(!members.includes(name)) setMembers(m=>[...m,name]); };
  const updateProjInfo=(id,data)=>setProjects(ps=>ps.map(p=>p.id!==id?p:{...p,...data}));
  const updateProjTasks=(tasks)=>setProjects(ps=>ps.map(p=>p.id!==view?p:{...p,tasks}));
  const updateTask=(upd)=>{ updateProjTasks(proj.tasks.map(t=>t.id===upd.id?upd:t)); setSelTask(upd); };
  const deleteTask=(tid)=>{ updateProjTasks(proj.tasks.filter(t=>t.id!==tid)); if(selTask?.id===tid)setSelTask(null); };
  const addTask=()=>{
    if(!newTask.title.trim())return;
    const t=mkTask({...newTask,id:nid()});
    updateProjTasks([...proj.tasks,t]);
    setNewTask({title:"",status:"todo",priority:"mid",due:"",assignee:""});
    setShowAdd(false); setSelTask(t);
  };
  const addProject=()=>{
    if(!newProj.name.trim())return;
    const id=nid();
    setProjects(ps=>[...ps,{...newProj,id,tasks:[]}]);
    setView(id); setShowAddProj(false); setSelTask(null);
    setNewProj({name:"",tag:"",color:"#6366f1",period:"",budget:"",remark:""});
  };
  const deleteProject=(id)=>{
    if(!confirm("프로젝트를 삭제할까요?"))return;
    const rest=projects.filter(p=>p.id!==id);
    setProjects(rest); if(view===id){setView("dashboard");setSelTask(null);}
  };

  const getSorted=(tasks)=>{
    const base=[...tasks];
    if(sort==="due"){
      return base.sort((a,b)=>{
        if(!a.due&&!b.due)return 0;
        if(!a.due)return 1; if(!b.due)return -1;
        return new Date(a.due)-new Date(b.due);
      });
    }
    if(sort==="priority") return base.sort((a,b)=>PRI_ORDER[a.priority]-PRI_ORDER[b.priority]);
    return base;
  };

  const filtered = proj ? getSorted(proj.tasks.filter(t=>filter==="all"||t.status===filter)) : [];

  // 기한 D-day 계산
  const getDday=(due)=>{
    if(!due)return null;
    const diff=Math.ceil((new Date(due)-new Date())/(1000*60*60*24));
    if(diff<0)return{label:`D+${Math.abs(diff)}`,color:"#94a3b8"};
    if(diff===0)return{label:"D-Day",color:"#ef4444"};
    if(diff<=3)return{label:`D-${diff}`,color:"#ef4444"};
    if(diff<=7)return{label:`D-${diff}`,color:"#f59e0b"};
    return{label:`D-${diff}`,color:"#94a3b8"};
  };

  return(
    <div style={{display:"flex",height:"100vh",fontSize:14,background:"#f1f5f9"}}>
      {/* Sidebar */}
      <div style={{width:220,background:"#1e1e2e",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div onClick={()=>{setView("dashboard");setSelTask(null);}}
          style={{padding:"16px",cursor:"pointer",borderBottom:"1px solid #2d2d3f",display:"flex",alignItems:"center",gap:8,background:view==="dashboard"?"#2d2d3f":"transparent"}}>
          <span style={{fontSize:16}}>🏠</span>
          <span style={{color:view==="dashboard"?"#fff":"#9ca3af",fontWeight:700,fontSize:13}}>대시보드</span>
        </div>
        <div style={{padding:"10px 16px 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{color:"#a78bfa",fontWeight:700,fontSize:12,letterSpacing:1}}>📁 PROJECTS</div>
          <button onClick={()=>setShowAddProj(v=>!v)} style={{background:"#2d2d3f",border:"none",color:"#a78bfa",borderRadius:5,width:22,height:22,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        </div>
        {showAddProj&&(
          <div style={{padding:"8px 12px",background:"#16162a",borderBottom:"1px solid #2d2d3f"}}>
            {[["프로젝트명","name"],["태그","tag"],["사업기간","period"],["사업비","budget"],["비고","remark"]].map(([ph,k])=>(
              <input key={k} value={newProj[k]} onChange={e=>setNewProj(n=>({...n,[k]:e.target.value}))} placeholder={ph}
                style={{width:"100%",padding:"4px 7px",borderRadius:5,border:"none",background:"#2d2d3f",color:"#fff",fontSize:11,marginBottom:5,outline:"none"}}/>
            ))}
            <div style={{display:"flex",gap:3,marginBottom:7}}>
              {COLORS.map(c=><div key={c} onClick={()=>setNewProj(n=>({...n,color:c}))} style={{width:16,height:16,borderRadius:"50%",background:c,cursor:"pointer",border:newProj.color===c?"2px solid #fff":"2px solid transparent"}}/>)}
            </div>
            <div style={{display:"flex",gap:5}}>
              <button onClick={addProject} style={{flex:1,padding:"4px 0",background:"#6366f1",color:"#fff",border:"none",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:700}}>추가</button>
              <button onClick={()=>setShowAddProj(false)} style={{flex:1,padding:"4px 0",background:"#374151",color:"#9ca3af",border:"none",borderRadius:5,cursor:"pointer",fontSize:11}}>취소</button>
            </div>
          </div>
        )}
        <div style={{flex:1,overflowY:"auto",padding:"6px 0"}}>
          {projects.map(p=>{
            const pct=p.tasks.length?Math.round(p.tasks.filter(t=>t.status==="done").length/p.tasks.length*100):0;
            return(
              <div key={p.id} onClick={()=>{setView(p.id);setFilter("all");setSort("default");setSelTask(null);}}
                style={{padding:"9px 16px",cursor:"pointer",background:view===p.id?"#2d2d3f":"transparent",borderLeft:view===p.id?`3px solid ${p.color}`:"3px solid transparent"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{color:view===p.id?"#fff":"#9ca3af",fontSize:11,fontWeight:600,marginBottom:3,flex:1,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{p.name}</div>
                  {view===p.id&&<button onClick={e=>{e.stopPropagation();deleteProject(p.id);}} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:11,flexShrink:0,marginLeft:3}}>✕</button>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{flex:1,height:3,background:"#374151",borderRadius:2}}><div style={{width:`${pct}%`,height:"100%",background:p.color,borderRadius:2}}/></div>
                  <span style={{color:"#6b7280",fontSize:9}}>{pct}%</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 뷰 */}
      {view==="dashboard"?(
        <Dashboard projects={projects} onSelectProject={(id)=>{setView(id);setFilter("all");setSort("default");setSelTask(null);}} onUpdateProject={updateProjInfo}/>
      ):proj?(
        <>
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
            {/* 헤더 */}
            <div style={{background:"#fff",padding:"10px 16px",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <button onClick={()=>{setView("dashboard");setSelTask(null);}} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:12,padding:"2px 6px",borderRadius:6}}>← 대시보드</button>
              <div style={{width:1,height:14,background:"#e2e8f0"}}/>
              <div style={{width:8,height:8,borderRadius:"50%",background:proj.color,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0,fontWeight:700,color:"#1e293b",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{proj.name}</div>
              <div style={{display:"flex",gap:4,flexShrink:0,flexWrap:"wrap"}}>
                {["all","todo","doing","done"].map(s=>(
                  <button key={s} onClick={()=>setFilter(s)} style={{padding:"3px 8px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:filter===s?proj.color:"#f1f5f9",color:filter===s?"#fff":"#64748b"}}>
                    {s==="all"?"전체":STATUS[s]}
                  </button>
                ))}
              </div>
            </div>
            {/* 스탯 + 정렬 */}
            <div style={{display:"flex",gap:7,padding:"10px 14px 0",flexWrap:"wrap",alignItems:"center"}}>
              {[["전체",proj.tasks.length,"#6366f1"],["할 일",proj.tasks.filter(t=>t.status==="todo").length,"#6b7280"],["진행 중",proj.tasks.filter(t=>t.status==="doing").length,"#3b82f6"],["완료",proj.tasks.filter(t=>t.status==="done").length,"#10b981"]].map(([l,v,c])=>(
                <div key={l} style={{background:"#fff",borderRadius:9,padding:"5px 12px",display:"flex",alignItems:"center",gap:5,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
                  <span style={{fontSize:16,fontWeight:800,color:c}}>{v}</span>
                  <span style={{color:"#94a3b8",fontSize:10}}>{l}</span>
                </div>
              ))}
              {/* 정렬 선택 */}
              <div style={{display:"flex",alignItems:"center",gap:5,marginLeft:"auto"}}>
                <span style={{fontSize:11,color:"#94a3b8"}}>정렬</span>
                {[["default","기본"],["due","기한 마감임박"],["priority","우선순위"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setSort(val)}
                    style={{padding:"3px 9px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
                      background:sort===val?proj.color:"#f1f5f9",color:sort===val?"#fff":"#64748b"}}>
                    {label}
                  </button>
                ))}
              </div>
              <button onClick={()=>{setShowAdd(true);setSelTask(null);}} style={{padding:"5px 11px",background:proj.color,color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontWeight:600,fontSize:12}}>+ 추가</button>
            </div>

            {/* 태스크 리스트 */}
            <div style={{flex:1,overflowY:"auto",padding:13}}>
              {showAdd&&(
                <div style={{background:"#fff",borderRadius:10,padding:13,marginBottom:9,border:`2px dashed ${proj.color}`}}>
                  <div style={{fontWeight:700,color:"#1e293b",marginBottom:8,fontSize:13}}>새 태스크</div>
                  <input value={newTask.title} onChange={e=>setNewTask(n=>({...n,title:e.target.value}))} placeholder="태스크 제목"
                    onKeyDown={e=>e.key==="Enter"&&addTask()} className="inp" style={{marginBottom:7}}/>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    <select value={newTask.status} onChange={e=>setNewTask(n=>({...n,status:e.target.value}))} className="inp" style={{width:"auto"}}>
                      {Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                    </select>
                    <select value={newTask.priority} onChange={e=>setNewTask(n=>({...n,priority:e.target.value}))} className="inp" style={{width:"auto"}}>
                      {Object.entries(PRIORITY).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                    </select>
                    <input type="date" value={newTask.due} onChange={e=>setNewTask(n=>({...n,due:e.target.value}))} className="inp" style={{width:"auto"}}/>
                    <select value={newTask.assignee} onChange={e=>setNewTask(n=>({...n,assignee:e.target.value}))} className="inp" style={{width:"auto"}}>
                      <option value="">담당자</option>
                      {members.map(m=><option key={m} value={m}>{m}</option>)}
                    </select>
                    <button onClick={addTask} style={{padding:"4px 11px",background:proj.color,color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,fontSize:12}}>저장</button>
                    <button onClick={()=>setShowAdd(false)} style={{padding:"4px 8px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:6,cursor:"pointer",fontSize:12}}>취소</button>
                  </div>
                </div>
              )}
              {filtered.length===0&&<div style={{textAlign:"center",color:"#94a3b8",padding:50}}><div style={{fontSize:26,marginBottom:8}}>📭</div>태스크가 없습니다.</div>}
              {filtered.map((t,i)=>{
                const ds=t.subtasks.filter(s=>s.done).length;
                const isSel=selTask?.id===t.id;
                const dday=getDday(t.due);
                return(
                  <div key={t.id} onClick={()=>setSelTask(isSel?null:t)}
                    style={{background:"#fff",borderRadius:9,padding:"10px 13px",marginBottom:6,
                      boxShadow:isSel?`0 0 0 2px ${proj.color}`:"0 1px 3px rgba(0,0,0,.06)",
                      display:"flex",alignItems:"flex-start",gap:9,borderLeft:`4px solid ${SC[t.status]}`,cursor:"pointer"}}>
                    {sort!=="default"&&<div style={{color:"#94a3b8",fontSize:11,fontWeight:700,minWidth:18,paddingTop:1}}>{i+1}</div>}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,color:"#1e293b",marginBottom:3,fontSize:13,
                        textDecoration:t.status==="done"?"line-through":"none",opacity:t.status==="done"?.5:1}}>{t.title}</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                        <span style={{fontSize:10,padding:"1px 6px",borderRadius:20,background:PC[t.priority]+"20",color:PC[t.priority],fontWeight:700}}>{PRIORITY[t.priority]}</span>
                        <span style={{fontSize:10,padding:"1px 6px",borderRadius:20,background:SC[t.status]+"15",color:SC[t.status],fontWeight:600}}>{STATUS[t.status]}</span>
                        {t.assignee&&<span style={{fontSize:10,color:"#64748b"}}>👤 {t.assignee}</span>}
                        {dday&&<span style={{fontSize:10,fontWeight:700,color:dday.color}}>📅 {t.due} {dday.label}</span>}
                        {t.subtasks.length>0&&<span style={{fontSize:10,color:"#94a3b8"}}>하위 {ds}/{t.subtasks.length}</span>}
                      </div>
                      {t.subtasks.length>0&&(
                        <div style={{marginTop:5,height:3,background:"#f1f5f9",borderRadius:2}}>
                          <div style={{width:`${t.subtasks.length?ds/t.subtasks.length*100:0}%`,height:"100%",background:proj.color,borderRadius:2}}/>
                        </div>
                      )}
                    </div>
                    <button onClick={e=>{e.stopPropagation();deleteTask(t.id);}} style={{background:"none",border:"none",cursor:"pointer",color:"#e2e8f0",fontSize:14,flexShrink:0}}>✕</button>
                  </div>
                );
              })}
            </div>
          </div>
          {selTask&&(
            <DetailPanel
              task={proj.tasks.find(t=>t.id===selTask.id)||selTask}
              projColor={proj.color}
              onClose={()=>setSelTask(null)}
              onChange={updateTask}
              members={members}
              onAddMember={addMember}
            />
          )}
        </>
      ):null}
    </div>
  );
}

function App(){
  const [authed,setAuthed]=useState(!!sessionStorage.getItem("auth"));
  if(!authed)return<PasswordGate onAuth={()=>setAuthed(true)}/>;
  return<MainApp/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
